<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bubble Liner — تنسيق فقاعات المانهوا</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button class="compact-toggle" id="compactToggle">🖥️ وضع الفوتوشوب</button>

  <main class="container">
    <header class="page-header">
      <h1>Bubble Liner</h1>
      <p class="subtitle">اكتبي أو الصقي — النتائج تظهر فوراً</p>
    </header>

    <section class="input-panel card">
      <textarea
        id="inputText"
        autofocus
        placeholder="الصق ترجمتك هنا — كل سطر = فقاعة&#10;[c] دائرة | [o] بيضاوي | [b] مربع | [w] مستطيل عريض&#10;بدون tag = دائرة تلقائياً"
      ></textarea>

      <div class="controls" id="controlsBar">
        <select id="languageSelect" title="اللغة الافتراضية">
          <option value="auto">🌐 Auto</option>
          <option value="ar">العربية</option>
          <option value="en">English</option>
        </select>

        <select id="shapeSelect" title="شكل الفقاعة الافتراضي">
          <option value="circle">○ Circle</option>
          <option value="oval">⬭ Oval</option>
          <option value="box">□ Box</option>
          <option value="wide-box">▭ Wide Box</option>
        </select>

        <button id="processBtn" class="btn primary">معالجة ⌨️ Ctrl+Enter</button>
        <button id="sampleBtn" class="btn ghost">مثال</button>
        <button id="clearBtn" class="btn ghost">مسح</button>
      </div>

      <button id="collapseBtn" class="collapse-btn" type="button">إخفاء الإعدادات</button>
    </section>

    <section id="results" class="results" aria-live="polite"></section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="assertive"></div>

  <script src="formatter.js"></script>
  <script src="app.js"></script>
</body>
</html>
